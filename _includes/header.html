<a class="skip-link" href="#main">Skip to content</a>
<header class="site-header" data-header>
  <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} home">
    <span class="brand-mark" aria-hidden="true">A</span>
    <span>
      <strong>Anthyia</strong>
      <small>Consulting</small>
    </span>
  </a>

  <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-navigation" data-nav-toggle>
    <span class="nav-toggle-bar"></span>
    <span class="nav-toggle-bar"></span>
    <span class="nav-toggle-bar"></span>
    <span class="sr-only">Menu</span>
  </button>

  <nav class="primary-nav" id="primary-navigation" data-nav>
    {% for item in site.data.navigation %}
      <a href="{{ item.url | relative_url }}" {% if page.url == item.url %}aria-current="page"{% endif %}>{{ item.title }}</a>
    {% endfor %}
  </nav>
</header>
